<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        .container {
            background-color: blue;
            height: 80vh;
            width: 80vw;
            position: relative;

        }

        .box {
            background-color: red;
            height: 121px;
            width: 121px;
            position: absolute;
            bottom: 0;
            left: 0;
            border-radius: 70px;
            animation: skanimation 3s linear infinite,
             sk2 1s ease-out infinite alternate;
        }

        @keyframes skanimation {
            from {
                left: 0;
            }

            to {
            left:100%
            }
        }
    @keyframes sk2{
        from{
 bottom: 0;

        }
        to{
bottom: 100%;
        }
    }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">

        </div>
    </div>
</body>

</html>
