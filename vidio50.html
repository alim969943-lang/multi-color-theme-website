<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS filters</title>
    <style>
        /* img{
            filter: blur(10px);
        } */
         .img1{
            filter: brightness(122%);
         }

         .img2{
            filter: invert(1);
         }

         .img3{
            filter: grayscale(50%);
         }

    </style>
</head>
<body>
    <div class="container">
        <img class="img1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrtIq5-Ekqrv13qBtUlwpjvEo9uPbOqdDSVRLnIDU4Q2rBCLwKBwIAX1c&s" alt="">
        <img class="img2" src="https://w0.peakpx.com/wallpaper/518/289/HD-wallpaper-shahrukh-khan-srk-smile-srk-smile-thumbnail.jpg" alt="">
        <img class="img3" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSuqwewKWI9eJIP-m65o7ztZcStniGo0yVjNUTnU6dxU02jyZZLJba5X43cLIkdN9IbeQiF254WMpNuDYtiJltoM3i0ok3o3x6bYsZv7z-j&s=10" alt="">
    </div>
</body>
</html>
