<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS object fid</title>
    <style>
        .container {
            height: 488px;
            width: 444px;
            border: 2px solid black;
            /* background-color: azure; */
            background-position: center center;
            background-clip: border-box;
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_ceFd_e0bGW9F-leVRoRIne0ZwhAk-FkNMSzu4T02-A&s=10");
            background-repeat: no-repeat;

        }

        img {
            width: 444px;
            height: 488px;
            object-fit: cover;
            /* object-fit: fill; */
            /* object-position: top right; */
            object-position: 10px 20px;
            /* object-fit: contain; */
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSIJ4tsK-5-am7SRNPPnw4HNrBxOLFQOv0ihrH2AhNTCA&s=10" alt=""> -->

    </div>
</body>

</html>
